version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tbai_postgres
    environment:
      POSTGRES_DB: tbai
      POSTGRES_USER: tbai_user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - tbai_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tbai_user -d tbai']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tbai_pgdata:
